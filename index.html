<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ulangan Harian Sejarah | Hindu-Buddha di Nusantara</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* mencegah teks terpilih, anti copy dasar */
        }
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0a1f2e 0%, #0c2a3b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        /* Load Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        .container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* Card style */
        .card {
            background: #0f2c39;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid #2a4c62;
            transition: all 0.2s;
        }
        
        .btn {
            background: #1e6f5c;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .btn:hover {
            background: #289672;
            transform: scale(1.02);
        }
        .btn-danger {
            background: #c44536;
        }
        .btn-danger:hover {
            background: #b33b2c;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #289672;
            color: #d4f1f9;
        }
        .btn-outline:hover {
            background: #1e6f5c;
            border-color: #1e6f5c;
        }
        
        .school-header {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #07212e;
            border-radius: 42px;
            padding: 15px 25px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .logo-area {
            width: 65px;
            height: 65px;
            background: #174e64;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .school-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f9e56c;
            letter-spacing: 1px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
            color: #cae9ff;
        }
        input, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 28px;
            border: none;
            background: #1f4052;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .checkbox-group input {
            width: 22px;
            height: 22px;
            margin: 0;
        }
        
        /* ujian layout */
        .quiz-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .question-area {
            flex: 3;
            min-width: 250px;
        }
        .indicator-area {
            flex: 1;
            min-width: 180px;
            background: #0a212e;
            border-radius: 28px;
            padding: 18px;
        }
        .timer-box {
            background: #02131e;
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        .timer {
            font-size: 2.2rem;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 3px;
            background: #00000055;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
        }
        .question-card {
            background: #0d3647;
            border-radius: 28px;
            padding: 24px;
        }
        .question-text {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .option {
            background: #0f4157;
            border-radius: 60px;
            padding: 10px 18px;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #2d8b78;
        }
        .option.selected {
            background: #289672;
            border-color: #f9e56c;
            box-shadow: 0 0 6px #f9e56c;
        }
        .option:hover {
            background: #1f6f5a;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 28px;
        }
        .indicator-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .soal-num {
            background: #1f4b5e;
            text-align: center;
            padding: 10px 5px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .soal-num.answered {
            background: #289672;
            color: white;
        }
        .soal-num.current {
            border: 3px solid #f9c74f;
            background: #3d8f7a;
        }
        .warning {
            color: #ffb347;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-size: 2rem;
            backdrop-filter: blur(8px);
        }
        @media (max-width: 680px) {
            .question-text { font-size: 1rem; }
            .timer { font-size: 1.5rem; }
            .school-name { font-size: 1rem; }
        }
        footer {
            text-align: center;
            margin-top: 20px;
            color: #96b9c9;
        }
    </style>
</head>

        { text: "Candi Singasari merupakan salah satu peninggalan Kerajaan Singasari yang berisi arca...", a: "Wisnu dan Dewi Sri", b: "Buddha berwujud Amogapasa", c: "Durga Mahisasuramardini", d: "Ganesha", e: "Agastya", kunci: "B" },

        { text: "Sumpah Palapa yang diucapkan Gajah Mada bertujuan untuk...", a: "Membangun candi terbesar", b: "Menaklukkan seluruh Nusantara di bawah kekuasaan Majapahit", c: "Menyebarkan agama Buddha", d: "Menguasai jalur perdagangan laut", e: "Menghancurkan Kerajaan Singasari", kunci: "B" },

        { text: "Perang saudara yang melemahkan Majapahit pada akhir abad ke-14 dikenal dengan nama...", a: "Perang Bubat", b: "Perang Paregreg", c: "Pemberontakan Ranggalawe", d: "Perang Paderi", e: "Pemberontakan Trunojoyo", kunci: "B" },

        { text: "Candi Tikus, Candi Brahu, dan Kolam Segaran merupakan peninggalan arkeologis dari Kerajaan...", a: "Mataram Kuno", b: "Singasari", c: "Bali", d: "Majapahit", e: "Kediri", kunci: "D" }
    ];

    // ======================== GLOBAL VARIABLES ========================
    let shuffledIndices = [];          // urutan acak indeks soal
    let jawabanSiswa = new Array(50).fill(null);   // huruf A/B/C/D/E
    let waktuPerSoal = new Array(50).fill(0);      // detik per soal
    let soalDisplayStart = new Array(50).fill(null); // timestamp mulai tampil
    let currentIndex = 0;

    let timerInterval = null;

    let selesaiDikirim = false;

    let logAktivitas = [];
    let startExamTimestamp = null;
    let waktuSelesaiTimestamp = null;
    let statusAkhir = "Selesai";
    let namaSiswa = "", kelasSiswa = "";
    let isSubmitting = false;
    
    // data untuk sheets
    let SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQwmeTtJecit9M88glNFSd3IncGNGpqSPaP6JWsLXqPCuiv1VYyEDegpiNZNqDozMhNg/exec"; // GANTI DENGAN URL WEB APP ANDA
    
    // Elemen dom akan di render
    let appDiv = document.getElementById("app");
    
    // INISIALISASI ACak
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function resetShuffle() {
        shuffledIndices = [...Array(MASTER_SOAL.length).keys()];
        shuffleArray(shuffledIndices);
        jawabanSiswa.fill(null);
        waktuPerSoal.fill(0);
        soalDisplayStart.fill(null);
    }

    // Render UI berdasarkan state (menu atau ujian)
    let currentScreen = "menu"; // menu, exam, result
    
    // Helper log pelanggaran
    function addViolation(reason) {
        if (!ujianDimulai || selesaiDikirim) return;
        pelanggaranCount++;
        let logMsg = `${new Date().toLocaleTimeString()} - Pelanggaran ke-${pelanggaranCount}: ${reason}`;
        logAktivitas.push(logMsg);
        if (pelanggaranCount >= 2) {
            logAktivitas.push(`⛔ Dikumpulkan otomatis karena mencapai 2 pelanggaran.`);
            forceSubmit("Kecurangan (2x pelanggaran)");
        }
    }
    
    function forceSubmit(statusReason) {
        if (selesaiDikirim || !ujianDimulai) return;
        if (timerInterval) clearInterval(timerInterval);
        ujianDimulai = false;
        statusAkhir = statusReason;
        waktuSelesaiTimestamp = Date.now();
        submitHasil();
    }
    
    // Kirim data ke google sheets
    async function submitHasil() {
        if (isSubmitting) return;
        isSubmitting = true;
        showLoading(true);
        const benar = jawabanSiswa.reduce((acc, jaw, idx) => {
            if (jaw === null) return acc;
            const soalAsli = MASTER_SOAL[shuffledIndices[idx]];
            return acc + (jaw === soalAsli.kunci ? 1 : 0);
        }, 0);
        const salah = jawabanSiswa.filter(j => j !== null).length - benar;
        const nilai = Math.round((benar / 50) * 100);
        const waktuTerpakai = startExamTimestamp ? Math.floor((Date.now() - startExamTimestamp) / 1000) : 0;
        const waktuStr = `${Math.floor(waktuTerpakai/60)} menit ${waktuTerpakai%60} detik`;
        const jawabanSurat = jawabanSiswa.map(j => j || "-").join(",");
        const waktuPerSoalStr = waktuPerSoal.map(w => w || 0).join(",");
        const logStr = logAktivitas.join(" | ");
        
        const formData = new FormData();
        formData.append("timestamp", new Date().toISOString());
        formData.append("nama", namaSiswa);
        formData.append("kelas", kelasSiswa);
        formData.append("nilai", nilai);
        formData.append("benar", benar);
        formData.append("salah", salah);
        formData.append("waktu", waktuStr);
        formData.append("status", statusAkhir);
        formData.append("logaktivitas", logStr);
        formData.append("waktu_soal", waktuPerSoalStr);
        formData.append("jawaban_siswa", jawabanSurat);
        
        try {
            if (SCRIPT_URL && !SCRIPT_URL.includes("REPLACE_WITH_YOUR_DEPLOYED_ID")) {
                await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: formData });
            } else {
                console.warn("URL Google Apps Script belum diganti, data tidak terkirim.");
                logAktivitas.push("⚠️ Penyimpanan ke Google Sheets gagal: URL belum diset.");
            }
        } catch(e) { console.error(e); }
        showLoading(false);
        tampilkanHasil(nilai, benar, salah, waktuTerpakai);
    }
    
    function tampilkanHasil(nilai, benar, salah, waktuDetik) {
        currentScreen = "result";
        const menit = Math.floor(waktuDetik/60);
        const detik = waktuDetik%60;
        appDiv.innerHTML = `
            <div class="card" style="text-align:center;">
                <h2 style="color:#f9e56c;">✨ HASIL ULANGAN ✨</h2>
                <div style="background:#07212e; border-radius: 30px; padding:25px; margin:20px 0;">
                    <p style="font-size:3rem; font-weight:800;">${nilai}</p>
                    <p style="font-size:1.2rem;">Nilai Akhir</p>
                    <hr style="margin:15px 0; border-color:#2a5f6e;">
                    <p>✅ Benar: ${benar} | ❌ Salah: ${salah}</p>
                    <p>⏱️ Waktu: ${menit} menit ${detik} detik</p>
                    <p>📌 Status: ${statusAkhir}</p>
                </div>
                <div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
                    <button id="printPDFBtn" class="btn">📄 Simpan sebagai PDF</button>
                    <button id="backMenuBtn" class="btn btn-outline">🏠 Kembali ke Menu Utama</button>
                </div>
            </div>
        `;
        document.getElementById("printPDFBtn")?.addEventListener("click", () => window.print());
        document.getElementById("backMenuBtn")?.addEventListener("click", () => location.reload());
    }
    
    function showLoading(show) {
        let ld = document.getElementById("globalLoader");
        if(show) {
            if(!ld) {
                ld = document.createElement("div");
                ld.id = "globalLoader";
                ld.className = "loading";
                ld.innerHTML = "<div><div class='spinner'></div><p>Mengirim data...</p></div><style>.spinner{border:6px solid #fff; border-top:6px solid #1e6f5c; border-radius:50%; width:50px; height:50px; animation:spin 1s linear infinite; margin:auto;}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>";
                document.body.appendChild(ld);
            }
        } else if(ld) ld.remove();
    }
    
    // ======================== LAYAR UJIAN DENGAN NAVIGASI ========================
    function renderSoal() {
        if(currentScreen !== "exam") return;
        const soalIdx = shuffledIndices[currentIndex];
        const soal = MASTER_SOAL[soalIdx];
        const selected = jawabanSiswa[currentIndex];
        const optionsHtml = ['A','B','C','D','E'].map(opt => `
            <div class="option ${selected === opt ? 'selected' : ''}" data-opt="${opt}">
                <strong>${opt}.</strong> ${soal[opt.toLowerCase()]}
            </div>
        `).join('');
        document.getElementById("soalContainer").innerHTML = `
            <div class="question-card">
                <div class="question-text">${currentIndex+1}. ${soal.text}</div>
                <div class="options" id="optionsList">${optionsHtml}</div>
                <div class="nav-buttons">
                    <button id="prevBtn" class="btn" ${currentIndex===0 ? 'disabled style="opacity:0.5"' : ''}>◀ Sebelumnya</button>
                    <button id="nextBtn" class="btn">Berikutnya ▶</button>
                    <button id="submitExamBtn" class="btn btn-danger">✅ Kumpulkan</button>
                </div>
            </div>
        `;
        // event listener options
        document.querySelectorAll('.option').forEach(optDiv => {
            optDiv.addEventListener('click', (e) => {
                if(!ujianDimulai) return;
                const pilih = optDiv.dataset.opt;
                // catat waktu per soal (pertama kali menjawab)
                if(jawabanSiswa[currentIndex] === null && soalDisplayStart[currentIndex] !== null) {
                    const spent = Math.floor((Date.now() - soalDisplayStart[currentIndex]) / 1000);
                    if(spent>=0 && waktuPerSoal[currentIndex]===0) waktuPerSoal[currentIndex] = spent;
                }
                jawabanSiswa[currentIndex] = pilih;
                // update tampilan indikator
                perbaruiIndikator();
                renderSoal(); // refresh
            });
        });
        document.getElementById("prevBtn")?.addEventListener("click", () => { if(ujianDimulai && currentIndex>0) { currentIndex--; renderSoal(); }});
        document.getElementById("nextBtn")?.addEventListener("click", () => { if(ujianDimulai && currentIndex<49) { currentIndex++; renderSoal(); }});
        document.getElementById("submitExamBtn")?.addEventListener("click", () => {
            if(confirm("Yakin ingin mengumpulkan? Pastikan semua sudah dijawab.")) {
                if(timerInterval) clearInterval(timerInterval);
                ujianDimulai=false;
                statusAkhir = "Selesai (dikumpulkan)";
                waktuSelesaiTimestamp = Date.now();
                submitHasil();
            }
        });
        // catat start display untuk soal ini jika belum
        if(soalDisplayStart[currentIndex] === null) soalDisplayStart[currentIndex] = Date.now();
        perbaruiIndikator();
    }
    
    function perbaruiIndikator() {
        const container = document.getElementById("indicatorGrid");
        if(!container) return;
        let html = "";
        for(let i=0; i<50; i++) {
            const answered = jawabanSiswa[i] !== null;
            let cls = "soal-num";
            if(answered) cls += " answered";
            if(i === currentIndex) cls += " current";
            html += `<div class="${cls}" data-idx="${i}">${i+1}</div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll(".soal-num").forEach(el => {
            el.addEventListener("click", () => {
                if(ujianDimulai) {
                    currentIndex = parseInt(el.dataset.idx);
                    renderSoal();
                }
            });
        });
    }
    
    function startUjian() {
        resetShuffle();
        jawabanSiswa.fill(null);
        waktuPerSoal.fill(0);
        soalDisplayStart.fill(null);
        pelanggaranCount = 0;
        logAktivitas = [];
        ujianDimulai = true;
        currentIndex = 0;
        startExamTimestamp = Date.now();
        timerSeconds = 4200;
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!ujianDimulai) return;
            if(timerSeconds <= 0) {
                clearInterval(timerInterval);
                ujianDimulai = false;
                statusAkhir = "Waktu Habis";
                submitHasil();
            } else {
                timerSeconds--;
                const menit = Math.floor(timerSeconds/60);
                const detik = timerSeconds%60;
                const timerEl = document.getElementById("timerDisplay");
                if(timerEl) timerEl.innerText = `${menit.toString().padStart(2,'0')}:${detik.toString().padStart(2,'0')}`;
            }
        }, 1000);
        currentScreen = "exam";
        renderLayoutExam();
        renderSoal();
        startAntiCheatMonitoring();
    }
    
    function renderLayoutExam() {
        appDiv.innerHTML = `
            <div class="quiz-panel">
                <div class="question-area">
                    <div class="timer-box"><span class="timer" id="timerDisplay">70:00</span><div style="font-size:0.8rem;">Sisa Waktu</div></div>
                    <div id="soalContainer"></div>
                </div>
                <div class="indicator-area">
                    <h4>📌 Daftar Soal</h4>
                    <div id="indicatorGrid" class="indicator-grid"></div>
                    <div class="warning">⚠️ Klik nomor untuk navigasi</div>
                </div>
            </div>
        `;
        perbaruiIndikator();
    }
    
    // ANTI CHEAT & FULLSCREEN, visibility
    let fullscreenViolation = false;
    let visibilityTimeout = null;
    let hiddenStart = 0;
    function startAntiCheatMonitoring() {
        // Blok klik kanan, copy, cut, paste drag
        document.addEventListener('contextmenu', e => { e.preventDefault(); addViolation("Klik kanan"); return false; });
        document.addEventListener('copy', e => { e.preventDefault(); addViolation("Copy teks"); return false; });
        document.addEventListener('cut', e => { e.preventDefault(); addViolation("Cut"); return false; });
        document.addEventListener('paste', e => { e.preventDefault(); addViolation("Paste"); return false; });
        document.addEventListener('dragstart', e => { e.preventDefault(); addViolation("Drag"); return false; });
        // DevTools detection sederhana
        window.addEventListener('keydown', (e) => {
            if(e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                addViolation("Mencoba membuka devtools");
            }
        });
        // visibility change
        document.addEventListener('visibilitychange', () => {
            if(!ujianDimulai) return;
            if(document.hidden) {
                hiddenStart = Date.now();
            } else {
                const dur = (Date.now() - hiddenStart)/1000;
                if(dur > 3) addViolation(`Meninggalkan halaman selama ${Math.floor(dur)} detik`);
            }
        });
        // fullscreen change
        document.addEventListener('fullscreenchange', () => {
            if(!ujianDimulai) return;
            if(!document.fullscreenElement) {
                addViolation("Keluar dari mode layar penuh");
            }
        });
        // deteksi keluar fullscreen otomatis 2 kali trigger submit
    }
    
    function requestFullscreenAndStart(el) {
        if (el.requestFullscreen) el.requestFullscreen().then(() => {
            document.getElementById("startExamBtn").disabled = false;
            document.getElementById("startExamBtn").style.opacity = "1";
        }).catch(()=>alert("Izinkan fullscreen untuk memulai ujian."));
    }
    
    // Menu awal
    function renderMenu() {
        appDiv.innerHTML = `
            <div class="card">
                <div class="school-header">
                    <div class="logo-area"><img src="logo.png" alt="Logo" style="max-width:55px;" onerror="this.src='https://placehold.co/60x60/1e6f5c/white?text=SMA'"></div>
                    <div class="school-name">SMA NEGERI 5 TANAH PUTIH, KABUPATEN ROKAN HILIR</div>
                </div>
                <div class="form-group"><label>👤 Nama Lengkap</label><input type="text" id="namaSiswa" placeholder="Masukkan nama anda"></div>
                <div class="form-group"><label>📚 Kelas</label><select id="kelasSiswa"><option>10 Satu</option><option>10 Dua</option><option>10 Tiga</option><option>10 Empat</option><option>11 Satu</option><option>11 Dua</option><option>11 Tiga</option><option>12 Satu</option><option>12 Dua</option><option>12 Tiga</option></select></div>
                <div class="checkbox-group"><input type="checkbox" id="jujurCheck"> <label>Saya bersungguh-sungguh dan tidak akan bekerja sama dengan siapapun serta mengerjakan sendiri.</label></div>
                <div id="fullscreenWarning" style="background:#c4453655; border-radius:28px; padding:12px; margin: 20px 0; text-align:center;">⚠️ WAJIB: Klik tombol layar penuh terlebih dahulu sebelum mulai!</div>
                <button id="fullscreenBtn" class="btn" style="width:100%; margin-bottom:12px;">🖥️ Masuk ke Mode Layar Penuh</button>
                <button id="startExamBtn" class="btn" disabled style="width:100%; opacity:0.6;">🚀 Mulai Ulangan</button>
            </div>
        `;
        const fullBtn = document.getElementById("fullscreenBtn");
        const startBtn = document.getElementById("startExamBtn");
        fullBtn.addEventListener("click", () => requestFullscreenAndStart(document.documentElement));
        startBtn.addEventListener("click", () => {
            const nama = document.getElementById("namaSiswa").value.trim();
            const kelas = document.getElementById("kelasSiswa").value;
            const jujur = document.getElementById("jujurCheck").checked;
            if(!nama) return alert("Isi nama lengkap!");
            if(!jujur) return alert("Centang pernyataan kejujuran!");
            namaSiswa = nama;
            kelasSiswa = kelas;
            if(!document.fullscreenElement) return alert("Harus dalam mode layar penuh sebelum memulai!");
            startUjian();
        });
    }
    
    // Entry point
    renderMenu();
</script>
</body>
</html>
